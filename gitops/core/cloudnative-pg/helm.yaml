apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cloudnative-pg
  namespace: cloudnative-pg
spec:
  interval: 5m
  url: https://cloudnative-pg.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: cloudnative-pg
spec:
  interval: 10m
  timeout: 5m
  targetNamespace: cloudnative-pg
  # CRDs ship as conditional templates in this chart (.Values.crds.create,
  # default true) rather than a separate crds/ directory, so they install
  # automatically with the release - nothing extra needed here.
  chart:
    spec:
      chart: cloudnative-pg
      version: '0.29.0'
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
      interval: 5m
  releaseName: cloudnative-pg
  values:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
