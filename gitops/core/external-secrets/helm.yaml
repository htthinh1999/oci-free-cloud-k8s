apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 5m
  url: https://charts.external-secrets.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 10m
  timeout: 5m
  targetNamespace: external-secrets
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: external-secrets
      version: '1.3.2'
      sourceRef:
        kind: HelmRepository
        name: external-secrets
      interval: 5m
  releaseName: external-secrets
  values:
    # None of the three deployments (controller/webhook/cert-controller) had a
    # resources block, so their real memory usage (~30-70Mi each observed) was
    # unaccounted for on the node. Sized from that observed usage plus headroom.
    resources:
      requests:
        cpu: 20m
        memory: 96Mi
      limits:
        memory: 192Mi
    webhook:
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 128Mi
    certController:
      resources:
        requests:
          cpu: 10m
          memory: 96Mi
        limits:
          memory: 192Mi
