apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: longhorn
spec:
  interval: 5m
  url: https://charts.longhorn.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
spec:
  interval: 10m
  timeout: 5m
  chart:
    spec:
      chart: longhorn
      version: '1.11.1'
      sourceRef:
        kind: HelmRepository
        name: longhorn
      interval: 5m
  releaseName: longhorn
  values:
    defaultSettings:
      storageMinimalAvailablePercentage: 10
      # Longhorn reserves CPU for its per-node instance-manager pod as a
      # percentage of allocatable (default 12%, ~220m on this node's 1830m
      # allocatable) regardless of actual volume traffic. This is a
      # single-replica, low-throughput personal setup, so cut the reservation
      # to free up scheduling headroom for other workloads. Kept above ~3-4%
      # rather than going lower - this is a hard CPU guarantee for the engine
      # process actually serving your volume I/O, not just an idle controller.
      guaranteedInstanceManagerCPU: 4
    persistence:
      defaultClassReplicaCount: 1
    ingress:
      enabled: false
    csi:
      attacherReplicaCount: 1
      provisionerReplicaCount: 1
      resizerReplicaCount: 1
      snapshotterReplicaCount: 1
    longhornUI:
      replicas: 1
      # No resources block previously - real usage (~2Mi observed) was
      # unaccounted for. Best-effort key (follows the `longhornUI.*` prefix
      # already used above) - not verified against the chart's values.yaml
      # (network-blocked from the sandbox that authored this).
      resources:
        requests:
          cpu: 5m
          memory: 32Mi
        limits:
          memory: 64Mi
    longhornManager:
      # No resources block previously - real usage (~185Mi observed) was
      # unaccounted for. Best-effort key, same caveat as longhornUI above.
      resources:
        requests:
          cpu: 10m
          memory: 224Mi
        limits:
          memory: 448Mi
    # NOTE: deliberately not attempting the CSI sidecar containers
    # (csi-attacher/provisioner/resizer/snapshotter, 3 replicas each,
    # longhorn-csi-plugin, driver-deployer - collectively ~230Mi more real
    # usage, currently unaccounted). I have no confident basis for their
    # value paths in this chart version and didn't want to add keys that
    # silently no-op. Check `helm show values longhorn/longhorn --version
    # 1.11.1` if you want those covered too.
