apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway-resources
  namespace: flux-system
spec:
  interval: 1h
  path: ./gitops/core/envoy-gateway/resources/
  prune: true
  dependsOn:
    - name: envoy-gateway
  sourceRef:
    kind: GitRepository
    name: flux-system
