apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: wattvn-api
  namespace: flux-system
spec:
  interval: 1h
  path: ./gitops/core/wattvn-api
  prune: true
  dependsOn:
    - name: wattvn-postgres
    - name: external-secrets
    - name: envoy-gateway
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: wattvn-api
      namespace: wattvn-api
