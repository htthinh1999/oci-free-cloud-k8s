---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: fluxcd-telegram-bot-token
spec:
  refreshInterval: 3m
  secretStoreRef:
    kind: ClusterSecretStore
    name: oracle-vault
  target:
    name: fluxcd-telegram-bot-token
    creationPolicy: Owner
    deletionPolicy: Delete
    template:
      engineVersion: v2
      data:
        token: "{{ .token }}"
  data:
    # Reuses the same vault secret as the Alertmanager Telegram receiver
    # (kube-prometheus-stack/secret.yaml) - one bot token, two ExternalSecrets
    # (this namespace is flux-system, that one is monitoring), no new bot needed.
    - secretKey: token
      remoteRef:
        key: alertmanager-telegram-bot-token
        version: CURRENT
