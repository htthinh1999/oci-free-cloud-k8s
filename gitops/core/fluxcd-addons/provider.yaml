apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Provider
metadata:
  name: github
spec:
  type: github
  address: https://github.com/htthinh1999/oci-free-cloud-k8s
  secretRef:
    name: fluxcd-github-token
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Provider
metadata:
  name: telegram
spec:
  type: telegram
  # Same chat as the Alertmanager Telegram receiver (kube-prometheus-stack/helm.yaml).
  channel: "1270578204"
  secretRef:
    name: fluxcd-telegram-bot-token
