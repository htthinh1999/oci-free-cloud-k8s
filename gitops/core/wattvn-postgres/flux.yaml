apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: wattvn-postgres
  namespace: flux-system
spec:
  interval: 1h
  path: ./gitops/core/wattvn-postgres
  prune: true
  dependsOn:
    - name: cloudnative-pg
    - name: external-secrets
  sourceRef:
    kind: GitRepository
    name: flux-system
