apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wattvn-postgres-app-user
  namespace: wattvn-postgres
spec:
  refreshInterval: 3m
  secretStoreRef:
    kind: ClusterSecretStore
    name: oracle-vault
  target:
    name: wattvn-postgres-app-user
    creationPolicy: Owner
    deletionPolicy: Delete
    template:
      engineVersion: v2
      # Required: CNPG's bootstrap.initdb.secret expects this exact type,
      # with username/password keys, username matching spec.bootstrap.initdb.owner.
      type: kubernetes.io/basic-auth
      data:
        username: wattvn
        password: "{{ .pw }}"
  data:
    - secretKey: pw
      remoteRef:
        key: wattvn-postgres-app-password
        version: CURRENT
        decodingStrategy: None
