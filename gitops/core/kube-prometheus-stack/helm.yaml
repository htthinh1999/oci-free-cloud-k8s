apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
spec:
  interval: 5m
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  interval: 10m
  timeout: 5m
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: kube-prometheus-stack
      version: '80.14.4'
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
      interval: 5m
  valuesFrom:
    - kind: ConfigMap
      name: flux-kube-state-metrics-config
      valuesKey: kube-state-metrics-config.yaml
  values:
    prometheus:
      ingress:
        enabled: false
      prometheusSpec:
        enableRemoteWriteReceiver: true
        podMonitorNamespaceSelector: {}
        podMonitorSelector:
          matchLabels:
            app.kubernetes.io/component: monitoring
        retention: ""
        retentionSize: 14GB
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 15Gi
    defaultRules:
      create: true
      rules:
        alertmanager: true
        etcd: false
        configReloaders: true
        general: true
        k8s: true
        kubeApiserverAvailability: true
        kubeApiserverBurnrate: true
        kubeApiserverHistogram: true
        kubeApiserverSlos: true
        kubeControllerManager: false
        kubelet: false
        kubeProxy: false
        kubePrometheusGeneral: true
        kubePrometheusNodeRecording: true
        kubernetesApps: true
        kubernetesResources: true
        kubernetesStorage: true
        kubernetesSystem: false
        kubeSchedulerAlerting: false
        kubeStateMetrics: true
        network: true
        node: true
        nodeExporterAlerting: true
        nodeExporterRecording: true
        prometheus: true
        prometheusOperator: true
    grafana:
      enabled: false
      forceDeployDashboards: true
      namespaceOverride: grafana
      forceDeployDatasources: true
    alertmanager:
      alertmanagerSpec:
        volumes:
          - name: telegram-bot-token
            secret:
              secretName: alertmanager-telegram-bot-token
        volumeMounts:
          - name: telegram-bot-token
            mountPath: /etc/telegram-bot-token
            readOnly: true
      config:
        inhibit_rules:
          - source_matchers:
              - "alertname = InfoInhibitor"
            target_matchers:
              - "severity = info"
            equal:
              - "namespace"
        route:
          group_by: ["namespace"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: "telegram"
          routes:
            - receiver: "null"
              matchers:
                - alertname =~ "InfoInhibitor|Watchdog"
        receivers:
          - name: "null"
          - name: "telegram"
            telegram_configs:
              - send_resolved: true
                chat_id: 1270578204
                bot_token_file: /etc/telegram-bot-token/token
                parse_mode: "Markdown"
                # Ranges over .Alerts.Firing/.Resolved per-alert instead of using
                # .CommonLabels/.CommonAnnotations - those are only populated with
                # fields shared by every alert in the group, so with group_by just
                # ["namespace"] a group holding two different alerts would render
                # blank pod/summary/description. This also lets firing and resolved
                # alerts show up distinctly in the same notification.
                message: |-
                  {{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} *{{ .CommonLabels.namespace }}* — {{ len .Alerts.Firing }} firing{{ if gt (len .Alerts.Resolved) 0 }}, {{ len .Alerts.Resolved }} resolved{{ end }}
                  {{ range .Alerts.Firing }}
                  {{ if eq .Labels.severity "critical" }}🔴{{ else if eq .Labels.severity "warning" }}🟠{{ else }}ℹ️{{ end }} *{{ .Labels.alertname }}*
                  *Severity:* {{ .Labels.severity }}
                  {{ if .Labels.pod }}*Pod:* {{ .Labels.pod }}
                  {{ end }}*Summary:* {{ .Annotations.summary }}
                  *Description:* {{ .Annotations.description }}
                  *Since:* {{ .StartsAt.Format "2006-01-02 15:04 MST" }}
                  {{ end }}{{ range .Alerts.Resolved }}
                  ✅ *{{ .Labels.alertname }}* resolved (was firing for {{ .EndsAt.Sub .StartsAt }})
                  {{ end }}
                  [🔍 View in Grafana](https://monitoring.keycodemon.org/alerting/list?search=state:firing)
