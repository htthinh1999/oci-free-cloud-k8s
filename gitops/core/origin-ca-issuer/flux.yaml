apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: origin-ca-issuer
  namespace: flux-system
spec:
  interval: 1h
  path: ./gitops/core/origin-ca-issuer
  prune: true
  dependsOn:
    - name: cert-manager
    - name: external-secrets
  sourceRef:
    kind: GitRepository
    name: flux-system
