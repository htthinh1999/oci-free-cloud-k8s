apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: origin-ca-issuer
  namespace: origin-ca-issuer
spec:
  interval: 5m
  type: oci
  url: oci://ghcr.io/cloudflare/origin-ca-issuer-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: origin-ca-issuer
  namespace: origin-ca-issuer
spec:
  interval: 10m
  timeout: 5m
  # NOTE: this chart does not ship a `crds/` directory, so there is nothing for
  # Flux's install.crds/upgrade.crds to manage here - the CRDs are applied
  # directly as plain manifests in crds.yaml instead. See the comment there.
  chart:
    spec:
      chart: origin-ca-issuer
      version: "0.6.9"
      sourceRef:
        kind: HelmRepository
        name: origin-ca-issuer
      interval: 5m
  releaseName: origin-ca-issuer
  values:
    controller:
      # Observed usage is ~61Mi, right against the old 64Mi limit (OOM-kill risk).
      # Bump both request and limit to give real headroom. CPU trimmed to 5m -
      # actual usage is ~1m.
      resources:
        requests:
          cpu: 5m
          memory: 48Mi
        limits:
          memory: 96Mi
