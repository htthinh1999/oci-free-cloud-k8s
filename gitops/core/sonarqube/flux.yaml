apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sonarqube
  namespace: flux-system
spec:
  interval: 1h
  path: ./gitops/core/sonarqube
  prune: true
  dependsOn:
    - name: external-secrets
    - name: envoy-gateway
  sourceRef:
    kind: GitRepository
    name: flux-system
