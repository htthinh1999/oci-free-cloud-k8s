apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sonarqube-secrets
  namespace: sonarqube
spec:
  refreshInterval: 3m
  secretStoreRef:
    kind: ClusterSecretStore
    name: oracle-vault
  target:
    name: sonarqube-secrets
    creationPolicy: Owner
    deletionPolicy: Delete
    template:
      engineVersion: v2
      data:
        # SonarQube's chart only rotates the admin password away from its
        # own default ("admin") on first boot, so currentPassword is not a
        # secret in itself - it's a fixed constant, not pulled from vault.
        currentPassword: admin
        password: "{{ .adminPassword }}"
        monitoring-passcode: "{{ .monitoringPasscode }}"
  data:
    - secretKey: adminPassword
      remoteRef:
        key: sonarqube-admin-password
        version: CURRENT
        decodingStrategy: None
    - secretKey: monitoringPasscode
      remoteRef:
        key: sonarqube-monitoring-passcode
        version: CURRENT
        decodingStrategy: None
