apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 5m
  url: https://kubernetes-sigs.github.io/external-dns
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 10m
  timeout: 5m
  chart:
    spec:
      chart: external-dns
      version: "1.20.0"
      sourceRef:
        kind: HelmRepository
        name: external-dns
      interval: 5m
  releaseName: external-dns
  values:
    provider:
      name: cloudflare
    policy: sync
    sources:
      - service
      - ingress
      - crd
      - gateway-httproute
    managedRecordTypes:
      - A
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: external-dns-config
            key: apiKey
    extraArgs:
      - --exclude-target-net=10.0.0.0/8
    # No resources block previously - the pod's real usage (~110Mi observed) was
    # unaccounted for, giving a false picture of node headroom. Sized from that.
    # CPU trimmed to 5m - actual usage is ~1m.
    resources:
      requests:
        cpu: 5m
        memory: 128Mi
      limits:
        memory: 256Mi
