apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: teleport
  namespace: teleport
spec:
  interval: 5m
  url: https://charts.releases.teleport.dev
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: teleport-cluster
  namespace: teleport
spec:
  interval: 10m
  timeout: 5m
  chart:
    spec:
      chart: teleport-cluster
      version: "18.7.5"
      sourceRef:
        kind: HelmRepository
        name: teleport
      interval: 5m
  releaseName: teleport-cluster
  valuesFrom:
    - kind: ConfigMap
      name: oci-lb-sg-id
      valuesKey: values.yaml
  values:
    chartMode: standalone
    clusterName: teleport.keycodemon.org
    kubeClusterName: oci
    proxyListenerMode: multiplex
    auth:
      teleportConfig:
        auth_service:
          authentication:
            type: github
    authentication:
      type: github
      localAuth: true
      secondFactor: on
    highAvailability:
      replicaCount: 1
      certManager:
        enabled: true
        issuerName: letsencrypt
        issuerKind: ClusterIssuer
    operator:
      enabled: true
      # No resources block previously - real usage (~61Mi observed) was
      # unaccounted for. Best-effort key (`operator.*` prefix already used
      # above) - not verified against the chart's values.yaml (network-
      # blocked from the sandbox that authored this). Confirm with
      # `helm show values teleport-cluster --version 18.7.5` before relying
      # on this.
      resources:
        requests:
          cpu: 10m
          memory: 96Mi
        limits:
          memory: 192Mi
    ingress:
      enabled: false
    # Best-effort: the chart appears to template a single "teleport" container
    # for both the auth and proxy Deployments, so a shared top-level
    # `resources` key most likely applies to both (real usage ~77Mi auth /
    # ~58Mi proxy). Not verified - same caveat as operator.resources above.
    resources:
      requests:
        cpu: 10m
        memory: 96Mi
      limits:
        memory: 192Mi
    proxy:
      highAvailability:
        replicaCount: 1
      service:
        type: LoadBalancer
      annotations:
        service:
          external-dns.alpha.kubernetes.io/hostname: teleport.keycodemon.org
          oci.oraclecloud.com/load-balancer-type: "nlb"
          #          this does not work; the teleport chart doesn't support tpl
          #          oci-network-load-balancer.oraclecloud.com/oci-network-security-groups: "{{ tpl .Values.oci.lbsecuritygroup . }}"
          # oci-network-load-balancer.oraclecloud.com/oci-network-security-groups: "ocid1.networksecuritygroup.oc1.eu-frankfurt-1.aaaaaaaauxhghg36xuzzjgw2awsd3cv4p2f2jedr5palq6fpy4exd53tve5a"
