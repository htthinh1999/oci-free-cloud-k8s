sonar.projectKey=htthinh1999_oci-free-cloud-k8s_450a287e-11d2-40b7-8ebb-126f1cbf6fd8
sonar.projectName=oci-free-cloud-k8s
sonar.sourceEncoding=UTF-8

sonar.sources=.

# Terraform state/plugin/cache dirs and generated kubeconfig - not source.
sonar.exclusions=**/.terraform/**,**/*.tfstate,**/*.tfstate.backup,**/.kube.config,**/*.tfvars

# Server-side JRE auto-provisioning (scanner downloads a JRE from SonarQube
# at analysis time) gets its download reset mid-stream on our tiny
# single-node instance. Skip it and use the JDK set up by the CI workflow
# instead (see .github/workflows/sonarqube.yml).
sonar.scanner.skipJreProvisioning=true
