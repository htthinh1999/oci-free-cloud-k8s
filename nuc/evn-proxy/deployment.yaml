apiVersion: apps/v1
kind: Deployment
metadata:
  name: evn-proxy
  namespace: evn-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evn-proxy
  template:
    metadata:
      labels:
        app: evn-proxy
    spec:
      # This proxy never talks to the Kubernetes API - no token needed.
      automountServiceAccountToken: false
      containers:
        - name: nginx
          image: docker.io/library/nginx:alpine
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
              ephemeral-storage: 32Mi
            limits:
              memory: 64Mi
              ephemeral-storage: 64Mi
      volumes:
        - name: nginx-conf
          configMap:
            name: evn-proxy-nginx-conf
